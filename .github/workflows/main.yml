name: Full Auto Luau VM
on:
  push:
    branches: [main]
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auto-Fetch Luau WASM
        run: |
          mkdir -p public
          # Linkleri güncelledik (Doğrudan indirme linkleri)
          curl -L "https://github.com/luau-lang/luau/releases/latest/download/luau-web.js" -o public/luau.js
          curl -L "https://github.com/luau-lang/luau/releases/latest/download/luau-web.wasm" -o public/luau.wasm
          cp index.html public/index.html

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
